<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Mundial FIFA 2026</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">
<link rel="shortcut icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VS3ET16XXD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-VS3ET16XXD');
</script>

<style>
  :root {
    --bg: #06090f;
    --surface: #0d1420;
    --surface2: #111827;
    --border: #1e2d42;
    --accent: #c9a84c;
    --accent2: #e8c46a;
    --red: #e84545;
    --green: #2ecc71;
    --text: #e8edf5;
    --muted: #6b7c99;
    --tab-active: #c9a84c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #06090f 0%, #0a1628 50%, #06090f 100%);
    border-bottom: 1px solid var(--border);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(201,168,76,0.07) 0%, transparent 70%),
                radial-gradient(ellipse at 70% 50%, rgba(201,168,76,0.04) 0%, transparent 60%);
  }
  .hero-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 36px 24px 28px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: relative;
  }
  .trophy-icon {
    font-size: 56px;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.4));
  }
  .hero-text h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(36px, 6vw, 64px);
    letter-spacing: 2px;
    line-height: 1;
    color: var(--text);
  }
  .hero-text h1 span { color: var(--accent); }
  .hero-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .flags-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    font-size: 22px;
  }

  /* TABS */
  .tabs-bar {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .tabs-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 0;
    padding: 0 24px;
  }
  .tab-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    padding: 16px 24px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* MAIN */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* FILTERS */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 24px;
    align-items: center;
  }
  .filter-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }
  .filter-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .filter-select:focus { border-color: var(--accent); }
  .btn-clear {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-clear:hover { color: var(--text); border-color: var(--muted); }

  /* DATE SECTION */
  .date-section { margin-bottom: 32px; }
  .date-header {
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .date-count {
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    font-weight: 500;
    background: rgba(201,168,76,0.15);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0;
  }

  /* MATCH CARD */
  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    padding: 16px 20px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .match-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0.5;
  }
  .match-card:hover {
    border-color: rgba(201,168,76,0.3);
    transform: translateX(2px);
  }

  .match-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .match-group {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    padding: 3px 8px;
    border-radius: 4px;
  }
  .match-venue {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* TEAMS ROW */
  .teams-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
  }
  .team {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }
  .team.right {
    flex-direction: row-reverse;
    text-align: right;
  }
  .team-flag { line-height:1; display:flex; align-items:center; flex-shrink:0; }
  .team-flag img { width:36px; height:24px; border-radius:3px; display:block; }

  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  .vs-badge {
    font-family: 'Bebas Neue', cursive;
    font-size: 16px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
    min-width: 44px;
    text-align: center;
  }

  /* TIMES ROW */
  .times-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .time-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  .time-flag { display:flex; align-items:center; flex-shrink:0; }
  .time-flag img { width:22px; height:15px; border-radius:2px; display:block; }
  .time-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .time-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent2);
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
  }
  .no-results span { font-size: 40px; display: block; margin-bottom: 16px; }

  /* COUNTDOWN */
  .countdown-bar {
    background: linear-gradient(90deg, rgba(201,168,76,0.12) 0%, rgba(201,168,76,0.05) 100%);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    padding: 10px 24px;
  }
  .countdown-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .countdown-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .countdown-units {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    min-width: 58px;
  }
  .cd-num {
    font-family: 'Bebas Neue', cursive;
    font-size: 28px;
    line-height: 1;
    color: var(--accent2);
    letter-spacing: 1px;
  }
  .cd-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }
  .cd-sep {
    font-family: 'Bebas Neue', cursive;
    font-size: 24px;
    color: var(--border);
    margin-bottom: 12px;
  }
  .countdown-started {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--green);
    font-weight: 700;
  }

  /* GRUPOS TAB */
  .grupos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-top: 4px;
  }
  .grupo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .grupo-card:hover { border-color: rgba(201,168,76,0.3); }
  .grupo-card-header {
    background: linear-gradient(90deg, rgba(201,168,76,0.18), transparent);
    padding: 11px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .grupo-card-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .grupo-card-flags {
    display: flex;
    gap: 5px;
    font-size: 20px;
    align-items: center;
  }
  .grupo-team-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    border-bottom: 1px solid rgba(30,45,66,0.5);
    transition: background 0.15s;
  }
  .grupo-team-row:last-child { border-bottom: none; }
  .grupo-team-row:hover { background: rgba(255,255,255,0.03); }
  .grupo-team-num {
    font-family: 'Bebas Neue', cursive;
    font-size: 15px;
    color: var(--muted);
    min-width: 18px;
    text-align: center;
  }
  .grupo-team-flag { display: flex; align-items: center; }
  .grupo-team-flag img { width: 28px; height: 19px; border-radius: 3px; display:block; }
  .grupo-team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }
  .grupo-host-badge {
    font-size: 10px;
    background: rgba(201,168,76,0.18);
    color: var(--accent);
    padding: 2px 7px;
    border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ===================== LIGHT MODE ===================== */
  body.light {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8eef5;
    --border: #c8d6e5;
    --accent: #b8860b;
    --accent2: #9a6f00;
    --text: #1a2332;
    --muted: #6b7c99;
    --green: #1a8c4e;
  }
  body.light .hero {
    background: linear-gradient(135deg, #dde6f0 0%, #c8d8ec 50%, #dde6f0 100%);
  }
  body.light .hero::before {
    background: radial-gradient(ellipse at 30% 50%, rgba(184,134,11,0.1) 0%, transparent 70%);
  }
  body.light .tabs-bar { background: #fff; border-bottom: 2px solid var(--border); }
  body.light .match-card { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  body.light .countdown-bar { background: linear-gradient(90deg, rgba(184,134,11,0.1), rgba(184,134,11,0.04)); border-bottom: 1px solid rgba(184,134,11,0.2); }
  body.light .hero-text h1 { color: #1a2332; }
  body.light .trophy-icon { filter: drop-shadow(0 0 16px rgba(184,134,11,0.3)); }

  /* ===================== THEME TOGGLE ===================== */
  .theme-toggle {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 18px;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }

  /* ===================== RESPONSIVE MOBILE ===================== */
  @media (max-width: 768px) {
    .hero-inner { padding: 20px 16px 16px; gap: 14px; }
    .trophy-icon { font-size: 38px; }
    .hero-text h1 { font-size: 32px; }
    .hero-sub { font-size: 12px; letter-spacing: 1.5px; }
    .flags-row { font-size: 18px; }

    .countdown-bar { padding: 8px 16px; }
    .countdown-inner { gap: 10px; }
    .cd-unit { min-width: 46px; padding: 5px 10px; }
    .cd-num { font-size: 22px; }
    .cd-label { font-size: 9px; }
    .cd-sep { font-size: 18px; }
    .countdown-label { font-size: 11px; }

    .tabs-inner { overflow-x: auto; padding: 0 12px; gap: 0; }
    .tabs-inner::-webkit-scrollbar { display: none; }
    .tab-btn { padding: 13px 14px; font-size: 13px; }

    .main { padding: 14px; }

    /* Calendar */
    .filters { gap: 8px; }
    .filter-select { font-size: 13px; padding: 7px 10px; }

    .match-card { padding: 12px 14px; }
    .team-name { font-size: 14px; }
    .vs-badge { font-size: 13px; padding: 3px 7px; min-width: 36px; }
    .times-row { gap: 5px; }
    .time-chip { padding: 4px 7px; gap: 4px; }
    .time-label { font-size: 9px; letter-spacing: 0.5px; }
    .time-value { font-size: 13px; }
    .time-flag svg { width: 16px; height: 11px; }
    .match-venue { font-size: 11px; }
    .match-group { font-size: 11px; }
    .date-header { font-size: 18px; }

    /* Grupos */
    .grupos-grid { grid-template-columns: 1fr; gap: 12px; }
    .grupo-team-name { font-size: 15px; }

    /* Countdown */
    .countdown-inner { justify-content: flex-start; }
  }

  @media (max-width: 420px) {
    .hero-text h1 { font-size: 26px; }
    .trophy-icon { font-size: 30px; }
    .times-row { flex-wrap: wrap; }
    .time-chip { flex: 1 1 calc(50% - 5px); }
    .tab-btn { padding: 12px 10px; font-size: 12px; letter-spacing: 0.5px; }
  }


  /* SCROLL */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="trophy-icon">🏆</div>
    <div class="hero-text">
      <h1>Copa Mundial <span>FIFA 2026</span></h1>
      <div class="hero-sub">Estados Unidos · México · Canadá · 11 Jun — 19 Jul 2026</div>
      <div class="flags-row">🇲🇽 🇺🇸 🇨🇦</div>
    </div>
  </div>
</div>

<!-- COUNTDOWN BAR -->
<div class="countdown-bar">
  <div class="countdown-inner">
    <span class="countdown-label">⏱ Tiempo para el inicio</span>
    <div class="countdown-units" id="countdownUnits">
      <div class="cd-unit"><span class="cd-num" id="cd-dias">--</span><span class="cd-label">Días</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span class="cd-num" id="cd-horas">--</span><span class="cd-label">Horas</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span class="cd-num" id="cd-min">--</span><span class="cd-label">Min</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span class="cd-num" id="cd-seg">--</span><span class="cd-label">Seg</span></div>
    </div>
  </div>
</div>

<div class="tabs-bar">
  <div class="tabs-inner">
    <button class="tab-btn active" onclick="switchTab('calendario', event)">📅 Calendario</button>
    <button class="tab-btn" onclick="switchTab('grupos', event)">🌍 Grupos</button>
    <a class="tab-btn" href="/predicciones/" style="text-decoration:none;display:flex;align-items:center">🎯 Mis Predicciones</a>
    <a class="tab-btn" href="/album/" style="text-decoration:none;display:flex;align-items:center">📖 Mi Álbum</a>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
  </div>
</div>

<div class="main">

  <!-- ======================== CALENDARIO TAB ======================== -->
  <div class="tab-content active" id="tab-calendario">
    <div class="filters">
      <span class="filter-label">Ver por:</span>
      <select class="filter-select" id="filterMode" onchange="applyFilter()">
        <option value="fecha">Fecha</option>
        <option value="seleccion">Selección</option>
        <option value="grupo">Grupo</option>
      </select>
      <select class="filter-select" id="filterValue" onchange="applyFilter()">
        <option value="all">— Todos —</option>
      </select>
      <button class="btn-clear" onclick="clearFilter()">✕ Limpiar</button>
    </div>
    <div id="matchesList"></div>
  </div>

  <!-- ======================== GRUPOS TAB ======================== -->
  <div class="tab-content" id="tab-grupos">
    <div class="grupos-grid" id="gruposGrid"></div>
  </div>

</div>

<script>
// ==================== DATA ====================
const GROUPS = {
  A: ['México 🇲🇽', 'Sudáfrica 🇿🇦', 'Corea del Sur 🇰🇷', 'Rep. Checa 🇨🇿'],
  B: ['Canadá 🇨🇦', 'Bosnia y Herz. 🇧🇦', 'Qatar 🇶🇦', 'Suiza 🇨🇭'],
  C: ['Brasil 🇧🇷', 'Marruecos 🇲🇦', 'Haití 🇭🇹', 'Escocia 🏴󠁧󠁢󠁳󠁣󠁴󠁿'],
  D: ['Estados Unidos 🇺🇸', 'Paraguay 🇵🇾', 'Australia 🇦🇺', 'Turquía 🇹🇷'],
  E: ['Alemania 🇩🇪', 'Curazao 🇨🇼', 'Costa de Marfil 🇨🇮', 'Ecuador 🇪🇨'],
  F: ['Países Bajos 🇳🇱', 'Japón 🇯🇵', 'Suecia 🇸🇪', 'Túnez 🇹🇳'],
  G: ['Bélgica 🇧🇪', 'Egipto 🇪🇬', 'Irán 🇮🇷', 'Nueva Zelanda 🇳🇿'],
  H: ['España 🇪🇸', 'Cabo Verde 🇨🇻', 'Arabia Saudita 🇸🇦', 'Uruguay 🇺🇾'],
  I: ['Francia 🇫🇷', 'Senegal 🇸🇳', 'Irak 🇮🇶', 'Noruega 🇳🇴'],

// Timezone offsets relative to Argentina (ARG = UTC-3 in June)
// ARG  = UTC-3 → offset  0
// España (CEST) = UTC+2 → ARG+5
// México Centro (CDT) = UTC-6 → ARG-3
// EE.UU Este (EDT) = UTC-4 → ARG-1
// EE.UU Oeste (PDT) = UTC-7 → ARG-4

function fmtTime(argHour, argMin, dayOffset) {
  function pad(n){ return String(n).padStart(2,'0'); }
  function addHours(h, m, delta) {
    let totalMin = h * 60 + m + delta * 60;
    totalMin = ((totalMin % 1440) + 1440) % 1440;
    return { h: Math.floor(totalMin/60), m: totalMin%60 };
  }
  const arg = { h: argHour, m: argMin };
  const esp = addHours(argHour, argMin, 5);   // España CEST = ARG+5
  const mex = addHours(argHour, argMin, -3);  // México CDT  = ARG-3
  const est = addHours(argHour, argMin, -1);  // EE.UU Este  = ARG-1
  const pst = addHours(argHour, argMin, -4);  // EE.UU Oeste = ARG-4
  return {
    arg: `${pad(arg.h)}:${pad(arg.m)}`,
    esp: `${pad(esp.h)}:${pad(esp.m)}`,
    mex: `${pad(mex.h)}:${pad(mex.m)}`,
    est: `${pad(est.h)}:${pad(est.m)}`,
    pst: `${pad(pst.h)}:${pad(pst.m)}`
  };
}

function teamName(t) { return t.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\uFE00-\uFE0F\u200D\uFE0F󠁧󠁢󠁳󠁣󠁴󠁿󠁥󠁮󠁧\u{E0067}\u{E0062}\u{E0073}\u{E0063}\u{E0074}\u{E0065}\u{E006E}\u{E0067}\u{E007F}]/gu,'').trim(); }

function getTeams() {
  const set = new Set();
  MATCHES.forEach(m => { set.add(m[4]); set.add(m[5]); });
  return Array.from(set).sort((a,b) => teamName(a).localeCompare(teamName(b),'es'));
}
function getDates() {
  const seen = new Set(); const arr = [];
  MATCHES.forEach(m => { if(!seen.has(m[0])){ seen.add(m[0]); arr.push([m[0],m[1]]); }});
  return arr.sort((a,b) => a[1].localeCompare(b[1]));
}

function renderByDate(matches) {
  const byDate = {};
  matches.forEach(m => {
    const key = m[0];
    if(!byDate[key]) byDate[key] = { label: m[0], sort: m[1], matches: [] };
    byDate[key].matches.push(m);
  });
  const sorted = Object.values(byDate).sort((a,b) => a.sort.localeCompare(b.sort));
  let html = '';
  sorted.forEach(day => {
    html += `<div class="date-section">
      <div class="date-header">${day.label}<span class="date-count">${day.matches.length} partido${day.matches.length>1?'s':''}</span></div>`;
    day.matches.forEach(m => html += renderMatchCard(m));
    html += `</div>`;
  });
  return html;
}

function applyFilter() {
  const mode = document.getElementById('filterMode').value;
  const val = document.getElementById('filterValue').value;
  let filtered = MATCHES;
  if(val !== 'all') {
    if(mode === 'seleccion') filtered = MATCHES.filter(m => m[4] === val || m[5] === val);
    else if(mode === 'fecha') filtered = MATCHES.filter(m => m[0] === val);
    else if(mode === 'grupo') filtered = MATCHES.filter(m => m[6] === val);
  }
  const list = document.getElementById('matchesList');
  if(filtered.length === 0) {
    list.innerHTML = '<div class="no-results"><span>🔍</span>No se encontraron partidos</div>';
    return;
  }
  list.innerHTML = renderByDate(filtered);
}

function clearFilter() {
  document.getElementById('filterValue').value = 'all';
  applyFilter();
}

function updateFilterOptions() {
  const mode = document.getElementById('filterMode').value;
  const sel = document.getElementById('filterValue');
  sel.innerHTML = '<option value="all">— Todos —</option>';
  if(mode === 'seleccion') {
    getTeams().forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      sel.appendChild(opt);
    });
  } else if(mode === 'fecha') {
    getDates().forEach(([label, sort]) => {
      const opt = document.createElement('option');
      opt.value = label; opt.textContent = label;
      sel.appendChild(opt);
    });
  } else if(mode === 'grupo') {
    Object.keys(GROUPS).forEach(g => {
      const opt = document.createElement('option');
      opt.value = `Grupo ${g}`; opt.textContent = `Grupo ${g}`;
      sel.appendChild(opt);
    });
  }
}

document.getElementById('filterMode').addEventListener('change', () => {
  updateFilterOptions();
  applyFilter();
});

// ===================== THEME =====================
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
  try { localStorage.setItem('mundial_theme', isLight ? 'light' : 'dark'); } catch(e){}
}
function loadTheme() {
  try {
    const saved = localStorage.getItem('mundial_theme');
    if(saved === 'light') {
      document.body.classList.add('light');
      const btn = document.getElementById('themeToggle');
      if(btn) btn.textContent = '☀️';
    }
  } catch(e){}
}

// ===================== TAB SWITCH =====================
function switchTab(tab, e) {
  const ev = e || event;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  ev.target.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab === 'grupos') renderGrupos();
}

function initCountdown() {
  // Mexico City kickoff: June 11, 2026 at 13:00 CDT = 19:00 UTC
  const kickoff = new Date(Date.UTC(2026, 5, 11, 19, 0, 0)); // Jun 11 2026 19:00 UTC

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const now = new Date();
    const diff = kickoff - now;

    if(diff <= 0) {
      // Tournament has started
      document.getElementById('countdownUnits').innerHTML =
        '<span class="countdown-started">⚽ ¡El Mundial está en curso!</span>';
      return;
    }

    const dias  = Math.floor(diff / 86400000);
    const horas = Math.floor((diff % 86400000) / 3600000);
    const min   = Math.floor((diff % 3600000) / 60000);
    const seg   = Math.floor((diff % 60000) / 1000);

    document.getElementById('cd-dias').textContent  = dias;
    document.getElementById('cd-horas').textContent = pad(horas);
    document.getElementById('cd-min').textContent   = pad(min);
    document.getElementById('cd-seg').textContent   = pad(seg);
  }

  tick();
  setInterval(tick, 1000);
}

// ===================== GRUPOS RENDER =====================
const HOSTS = ['México 🇲🇽', 'Canadá 🇨🇦', 'Estados Unidos 🇺🇸'];

// Slugs de URL para cada selección (deben coincidir con las carpetas del servidor)
const TEAM_SLUGS = {
  'México':'mexico','Sudáfrica':'sudafrica','Corea del Sur':'corea-del-sur','Rep. Checa':'republica-checa',
  'Canadá':'canada','Bosnia y Herz.':'bosnia-herzegovina','Qatar':'qatar','Suiza':'suiza',
  'Brasil':'brasil','Marruecos':'marruecos','Haití':'haiti','Escocia':'escocia',
  'Estados Unidos':'estados-unidos','Paraguay':'paraguay','Australia':'australia','Turquía':'turquia',
  'Alemania':'alemania','Curazao':'curazao','Costa de Marfil':'costa-de-marfil','Ecuador':'ecuador',
  'Países Bajos':'paises-bajos','Japón':'japon','Suecia':'suecia','Túnez':'tunez',
  'Bélgica':'belgica','Egipto':'egipto','Irán':'iran','Nueva Zelanda':'nueva-zelanda',
  'España':'espana','Cabo Verde':'cabo-verde','Arabia Saudita':'arabia-saudita','Uruguay':'uruguay',
  'Francia':'francia','Senegal':'senegal','Irak':'irak','Noruega':'noruega',
  'Argentina':'argentina','Argelia':'argelia','Austria':'austria','Jordania':'jordania',
  'Portugal':'portugal','R.D. Congo':'republica-democratica-del-congo','Uzbekistán':'uzbekistan','Colombia':'colombia',
  'Inglaterra':'inglaterra','Croacia':'croacia','Ghana':'ghana','Panamá':'panama',
};

function renderGrupos() {
  const grid = document.getElementById('gruposGrid');
  if(grid.innerHTML.trim()) return;

  grid.innerHTML = Object.keys(GROUPS).map(g => {
    const teams = GROUPS[g];
    const flagsHtml = teams.map(t => `<span style="display:inline-flex;align-items:center">${getFlag(t)}</span>`).join('');

    const teamsHtml = teams.map((t, i) => {
      const isHost = HOSTS.some(h => teamName(t) === teamName(h));
      const name = teamName(t);
      const slug = TEAM_SLUGS[name];
      const inner = `
        <span class="grupo-team-num">${i+1}</span>
        <span class="grupo-team-flag">${getFlag(t, 28, 19)}</span>
        <span class="grupo-team-name">${name}</span>
        ${isHost ? '<span class="grupo-host-badge">Sede</span>' : ''}
        ${slug ? '<span style="font-size:11px;color:var(--muted);margin-left:auto;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:1px">Ver →</span>' : ''}`;
      if(slug) {
        return `<a href="/${slug}/" class="grupo-team-row" style="text-decoration:none;color:inherit">${inner}</a>`;
      }
      return `<div class="grupo-team-row">${inner}</div>`;
    }).join('');

    return `<div class="grupo-card">
      <div class="grupo-card-header">
        <span class="grupo-card-title">Grupo ${g}</span>
        <div class="grupo-card-flags">${flagsHtml}</div>
      </div>
      ${teamsHtml}
    </div>`;
  }).join('');
}
